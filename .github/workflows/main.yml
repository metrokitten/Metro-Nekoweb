name: Update Spotify Now Playing

on:
  schedule:
    - cron: '*/5  * * * *'
  workflow_dispatch:

jobs:
  update-spotify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get Spotify Now Playing
        id: spotify
        uses: bmitch86/spotify-now-playing-action@v1.2.0
        with:
          client-id: ${{ secrets.SPOTIFY_CLIENT_ID }}
          client-secret: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          refresh-token: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          output-file: data/now-playing.json

      - name: Commit updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/now-playing.json
          git commit -m "Update Spotify Now Playing" || echo "No changes"
          git push
